<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1e293b; border-bottom: 1px solid #334155; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .form-control { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; }
        .form-control:focus { background: #0f172a; color: #e2e8f0; border-color: #3b82f6; box-shadow: none; }
        .btn-primary { background: #3b82f6; border: none; }
        .btn-danger { background: #ef4444; border: none; padding: 2px 8px; font-size: 0.8rem; }
        .url-card { border-bottom: 1px solid #334155; padding: 15px 0; }
        .url-card:last-child { border-bottom: none; }
        .short-link { color: #3b82f6; text-decoration: none; font-weight: bold; }
        .click-badge { background: #1e3a5f; color: #60a5fa; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; }
        .copy-btn { background: #334155; border: none; color: #e2e8f0; padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .copy-btn:hover { background: #3b82f6; }
        h5, h6 { color: #ffffff; }
        .text-muted { color: #94a3b8 !important; }
        .result-box { background: #0f172a; border: 1px solid #10b981; border-radius: 8px; padding: 15px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand fw-bold fs-4">URL Shortener</span>
        <span class="text-muted">Built by Khizar Shezan</span>
    </nav>

    <div class="container py-5">
        <!-- Shorten Form -->
        <div class="row justify-content-center mb-5">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h5 class="mb-3">Shorten a URL</h5>
                    <div class="mb-3">
                        <input type="text" id="originalUrl" class="form-control" placeholder="Enter URL (e.g. https://google.com)">
                    </div>
                    <div class="mb-3">
                        <input type="text" id="urlTitle" class="form-control" placeholder="Title (optional)">
                    </div>
                    <button class="btn btn-primary w-100 py-2" onclick="shortenUrl()">Shorten URL</button>

                    <div class="result-box mt-3" id="resultBox">
                        <div class="text-muted mb-1">Your short URL:</div>
                        <div class="d-flex align-items-center gap-2">
                            <a id="shortUrlLink" href="#" target="_blank" class="short-link fs-5"></a>
                            <button class="copy-btn" onclick="copyUrl()">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <div class="text-muted">Total URLs</div>
                    <div class="fs-2 fw-bold text-primary" id="totalUrls">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <div class="text-muted">Total Clicks</div>
                    <div class="fs-2 fw-bold" style="color:#10b981" id="totalClicks">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <div class="text-muted">Most Clicked</div>
                    <div class="fs-5 fw-bold" style="color:#f59e0b" id="mostClicked">-</div>
                </div>
            </div>
        </div>

        <!-- URL List -->
        <div class="card p-4">
            <h5 class="mb-3">All Shortened URLs</h5>
            <div id="urlList"></div>
        </div>
    </div>

    <script>
        let currentShortUrl = '';

        async function shortenUrl() {
            const url = document.getElementById('originalUrl').value.trim();
            const title = document.getElementById('urlTitle').value.trim();
            if (!url) { alert('Please enter a URL'); return; }

            const response = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, title })
            });
            const data = await response.json();

            if (data.short_url) {
                currentShortUrl = data.short_url;
                document.getElementById('shortUrlLink').textContent = data.short_url;
                document.getElementById('shortUrlLink').href = data.short_url;
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('originalUrl').value = '';
                document.getElementById('urlTitle').value = '';
                loadUrls();
            }
        }

        function copyUrl() {
            navigator.clipboard.writeText(currentShortUrl);
            const btn = document.querySelector('.copy-btn');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
        }

        async function loadUrls() {
            const urls = await fetch('/api/urls').then(r => r.json());

            document.getElementById('totalUrls').textContent = urls.length;
            const totalClicks = urls.reduce((sum, u) => sum + u.click_count, 0);
            document.getElementById('totalClicks').textContent = totalClicks;

            const mostClicked = urls.sort((a, b) => b.click_count - a.click_count)[0];
            document.getElementById('mostClicked').textContent = mostClicked ? mostClicked.title || mostClicked.short_code : '-';

            const list = document.getElementById('urlList');
            list.innerHTML = urls.map(u => `
                <div class="url-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="fw-semibold">${u.title || 'Untitled'}</div>
                            <a href="http://localhost:5000/${u.short_code}" target="_blank" class="short-link">
                                localhost:5000/${u.short_code}
                            </a>
                            <div class="text-muted small mt-1">${u.original_url.substring(0, 60)}${u.original_url.length > 60 ? '...' : ''}</div>
                            <div class="text-muted small">Created: ${u.created_at} | Last clicked: ${u.last_clicked}</div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="click-badge">${u.click_count} clicks</span>
                            <button class="btn btn-danger" onclick="deleteUrl(${u.id})">X</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p class="text-muted text-center">No URLs shortened yet</p>';
        }

        async function deleteUrl(id) {
            await fetch(`/api/urls/${id}`, { method: 'DELETE' });
            loadUrls();
        }

        loadUrls();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
