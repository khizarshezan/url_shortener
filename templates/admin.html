<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: #eee; min-height: 100vh; }
        .stat-card { background: #16213e; border-radius: 16px; padding: 24px; text-align: center; }
        .stat-card h3 { color: #e94560; font-size: 36px; margin: 0; }
        .stat-card p { color: #aaa; margin: 8px 0 0; }
        .table-container { background: #16213e; border-radius: 16px; padding: 24px; margin-top: 24px; }
        table { color: #eee; }
        .table th { color: #e94560; border-color: #0f3460; }
        .table td { border-color: #0f3460; vertical-align: middle; }
        .btn-delete { background: #e94560; border: none; padding: 4px 12px; font-size: 13px; }
        .btn-delete:hover { background: #c81e45; }
        .navbar-admin { background: #16213e; padding: 16px 24px; margin-bottom: 24px; }
        .url-text { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; color: #7ec8e3; }
        .badge-clicks { background: #0f3460; color: #7ec8e3; padding: 4px 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="navbar-admin d-flex justify-content-between align-items-center">
        <h4 style="color: #e94560; margin: 0;">⚡ Admin Dashboard</h4>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">← Home</a>
            <a href="/admin/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="row g-3 mb-3" id="stats-row">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h3 id="total-urls">-</h3>
                    <p>Total URLs</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h3 id="total-users">-</h3>
                    <p>Unique Users</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h3 id="total-clicks">-</h3>
                    <p>Total Clicks</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <h3 id="today-urls">-</h3>
                    <p>URLs Today</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h5 style="color: #e94560;">📋 All Shortened URLs</h5>
            <div class="table-responsive mt-3">
                <table class="table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Original URL</th>
                            <th>Short Code</th>
                            <th>Clicks</th>
                            <th>Created</th>
                            <th>Session</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="urls-table"></tbody>
                </table>
            </div>
            <p class="text-muted text-center mt-3" id="empty-msg" style="display:none;">No URLs yet.</p>
        </div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch('/api/admin/stats');
            const data = await res.json();
            document.getElementById('total-urls').textContent = data.total_urls;
            document.getElementById('total-users').textContent = data.total_users;
            document.getElementById('total-clicks').textContent = data.total_clicks;
            document.getElementById('today-urls').textContent = data.today_urls;
        }

        async function loadUrls() {
            const res = await fetch('/api/admin/urls');
            const urls = await res.json();
            const tbody = document.getElementById('urls-table');
            const emptyMsg = document.getElementById('empty-msg');

            if (urls.length === 0) {
                tbody.innerHTML = '';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            tbody.innerHTML = urls.map((u, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${u.title || 'Untitled'}</td>
                    <td><span class="url-text" title="${u.original_url}">${u.original_url}</span></td>
                    <td><code>${u.short_code}</code></td>
                    <td><span class="badge-clicks">${u.click_count}</span></td>
                    <td>${u.created_at}</td>
                    <td><code style="font-size:11px;">${(u.session_id || '').substring(0, 8)}...</code></td>
                    <td><button class="btn btn-delete text-white btn-sm" onclick="deleteUrl(${u.id})">🗑️</button></td>
                </tr>
            `).join('');
        }

        async function deleteUrl(id) {
            if (!confirm('Delete this URL?')) return;
            await fetch(`/api/admin/urls/${id}`, { method: 'DELETE' });
            loadStats();
            loadUrls();
        }

        loadStats();
        loadUrls();
    </script>
</body>
</html>
