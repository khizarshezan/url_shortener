<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #16213e; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; }
        h2 { color: #e94560; }
        .form-control { background: #0f3460; border: none; color: white; }
        .form-control:focus { background: #0f3460; color: white; box-shadow: 0 0 0 2px #e94560; }
        .btn-admin { background: #e94560; border: none; width: 100%; padding: 12px; font-size: 16px; }
        .btn-admin:hover { background: #c81e45; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2>🔒 Admin Login</h2>
        <p class="text-muted mt-2 mb-4">Enter password to access dashboard</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter admin password" required>
            <button type="submit" class="btn btn-admin text-white">Login</button>
        </form>
        <a href="/" class="text-muted mt-3 d-block">← Back to home</a>
    </div>
</body>
</html>
